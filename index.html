<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <link rel="icon" type="image/png" href="/images/favicon.png">

    

</head>

<body>

    <body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

        <div class="w-full max-w-sm md:max-w-lg lg:max-w-xl bg-white rounded-2xl shadow-lg p-6">


            <!-- GRAPHIC CARD -->
            <div id="graphicCard" class="w-48 h-48 mx-auto rounded-xl bg-gray-300 mb-6 shadow-md shadow-[#8B5CF6]-400 overflow-hidden">
                <!-- <img src="/images/images.jpg" alt="" class="w-full h-full object-cover rounded-xl" /> -->
            </div>

            <!-- Song Info -->
            <div class="text-center mb-6">
                <h2 id="title" class=" text-2xl font-bold">
                    <!-- Song Title -->
                </h2>

                <p id="artist" class=" text-gray-500">
                    <!-- Artist Name -->
                </p>
            </div>

            <!--Song Progress -->
            <div class="mb-6 rounded-lg">
                <div class="flex justify-between text-sm text-gray-500 mb-2">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>

                <input type="range" id="progress" min="0" max="100" value="0" class="w-full" />
            </div>

            <!-- Controls -->
            <div class="flex justify-center items-center gap-6 mb-6">
                <button id="prev" class="text-2xl hover:bg-gray-200 rounded-full p-1 transition duration-200">
                    ⏮️
                </button>

                <button id="play"
                    class="bg-indigo-600 text-white w-14 h-14 rounded-full text-xl transition hover:bg-indigo-700">
                    ▶️
                </button>

                <button id="next" class="text-2xl hover:bg-gray-200 rounded-full p-1 transition duration-200">
                    ⏭️
                </button>
            </div>

            <!-- Volume -->
            <div class="flex items-center gap-3 mb-6">
                <span>🔊</span>

                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.6" class="w-full" />
            </div>

            <!-- audio element -->
            <audio id="audio"></audio>

            <!-- Playlist -->
            <div>
                <h3 class="font-semibold mb-3">
                    Playlist
                </h3>

                <div id="playlist" class="space-y-2 my-2 p-2 rounded-lg overflow-auto shadow-md" style="max-height: 200px; border: 1px solid #e5e7eb;">
                    <!-- Render songs here -->

                    <!-- <div>Ring Ring - Jax Jones, Mabel, Rich The Kid</div> -->

                </div>
            </div>


        </div>


        <!-- JavaScript -->
        <script src="/javascript/script.js"></script>
    </body>
</body>

</html>
